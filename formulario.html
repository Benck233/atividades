<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/formulario" method="post"> 

        <h2>Criando formulario</h2>

        <label for="nome" >Digite seu nome:</label><br>

        <input type="text" name="nome" placeholder="Digite aqui seu nome">


        <br>

        <label for="">Escolha:</label><br>
        
        <input type="radio" id="filmea" name="filmeab" value="Filme A">
        
        <label for="">Filme A</label>
        
        <input type="radio" id="filmeb" name="filmeab" value="Filme B">
        
        <label for="">Filme B</label>
        
        <input type="submit" value="Enviar"><br>

        <label for="email" name="email">Digite seu email:</label><br>
        <input type="email" name="email"
        placeholder="Digite seu email"><br>
        
        <label for="senha">Digite sua senha:</label><br>
        <input type="password" name="senha"
        placeholder="Digite sua senha."><br>

        <label for="mensagem">Mensagem:</label><br>
        <textarea
            id="Mensagem"
            name="mensagem"
            placeholder="Escreva sua mensagem aqui..."
        ></textarea><br>

        <label for="">Interesses</label><br>
        <label for="musica">Musica</label>
        <input type="checkbox" id="musica" name="interesses" value="Musica">
        <label for="livro">Livro</label>
        <input type="checkbox" id="livro" name="interesses" value="Livro">
        <label for="redesocial">Rede Social</label>
        <input type="checkbox" id="redesocial" name="interesses" value="Rede Social">
        <br>
        <label for="data">Data de Nascimento:</label>
        <input type="date">
        


    </form>
</body>
</html>
